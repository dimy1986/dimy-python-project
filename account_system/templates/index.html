{% extends "base.html" %}
{% block title %}首页 — 账户与交易查询系统{% endblock %}

{% block content %}
<div class="hero">
  <h1>账户与交易查询系统</h1>
  <p>内网专用 · 支持多种业务数据查询，结果可导出 Excel</p>
  <div class="hero-cards">
    {% for qid, qcfg in query_configs.items() %}
    <a href="{{ url_for(qid) }}" class="hero-card">
      <div class="icon">{{ qcfg.icon }}</div>
      <h2>{{ qcfg.title }}</h2>
      <p>{{ qcfg.description }}</p>
    </a>
    {% endfor %}
  </div>
</div>
{% endblock %}
