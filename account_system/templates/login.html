<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — 账户与交易查询系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "微软雅黑", "PingFang SC", sans-serif;
      background: #f0f2f5;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
      padding: 48px 40px 40px;
      width: 360px;
    }
    .login-logo {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #1a478a;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .login-subtitle {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-bottom: 32px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 18px;
    }
    .form-group label {
      font-size: 13px;
      color: #666;
    }
    .form-group input {
      border: 1px solid #d0d7e3;
      border-radius: 4px;
      padding: 9px 12px;
      font-size: 14px;
      height: 40px;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }
    .form-group input:focus { border-color: #1a478a; }
    .btn-login {
      width: 100%;
      height: 42px;
      background: #1a478a;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 6px;
      transition: opacity .2s;
    }
    .btn-login:hover { opacity: .88; }
    .alert-danger {
      background: #fde8e8;
      color: #c0392b;
      border-left: 4px solid #e74c3c;
      padding: 9px 14px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">🏦 账户与交易查询系统</div>
  <div class="login-subtitle">内网专用 · 请先登录</div>

  {% if error %}
  <div class="alert-danger">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <input type="hidden" name="next" value="{{ next }}">
    <div class="form-group">
      <label for="username">用户名</label>
      <input id="username" type="text" name="username" autocomplete="username"
             placeholder="请输入用户名" autofocus required>
    </div>
    <div class="form-group">
      <label for="password">密码</label>
      <input id="password" type="password" name="password" autocomplete="current-password"
             placeholder="请输入密码" required>
    </div>
    <button type="submit" class="btn-login">登 录</button>
  </form>
</div>
</body>
</html>
