<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}账户与交易查询系统{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "微软雅黑", "PingFang SC", sans-serif;
      background: #f0f2f5;
      color: #333;
    }
    /* ── 顶部导航 ── */
    header {
      background: #1a478a;
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 56px;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    header .logo { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
    nav { margin-left: 40px; display: flex; gap: 4px; }
    nav a {
      color: rgba(255,255,255,.85);
      text-decoration: none;
      padding: 6px 16px;
      border-radius: 4px;
      font-size: 15px;
      transition: background .2s;
    }
    nav a:hover, nav a.active { background: rgba(255,255,255,.2); color: #fff; }
    /* ── 内容区 ── */
    .container { max-width: 1200px; margin: 28px auto; padding: 0 20px; }
    /* ── 卡片 ── */
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,.1);
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    .card-title {
      font-size: 17px;
      font-weight: 700;
      color: #1a478a;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8edf5;
    }
    /* ── 表单 ── */
    .form-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 13px; color: #666; }
    .form-group input, .form-group select {
      border: 1px solid #d0d7e3;
      border-radius: 4px;
      padding: 7px 11px;
      font-size: 14px;
      height: 36px;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: #1a478a; }
    .btn {
      height: 36px;
      padding: 0 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #1a478a; color: #fff; }
    .btn-success { background: #28a745; color: #fff; }
    /* ── 结果表格 ── */
    .result-info { font-size: 13px; color: #888; margin-bottom: 12px; }
    .result-info span { color: #1a478a; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      background: #eaf0fb;
      color: #1a478a;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
      border-bottom: 2px solid #c9d8ef;
    }
    td {
      padding: 9px 12px;
      border-bottom: 1px solid #eef0f4;
      vertical-align: middle;
    }
    tr:hover td { background: #f5f8ff; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-normal  { background: #e6f7ee; color: #28a745; }
    .badge-frozen  { background: #fff3cd; color: #856404; }
    .badge-closed  { background: #f8d7da; color: #842029; }
    .badge-debit   { background: #fde8e8; color: #c0392b; }
    .badge-credit  { background: #e8f5e9; color: #27ae60; }
    /* ── 警告/提示 ── */
    .alert {
      padding: 10px 16px;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .alert-danger  { background: #fde8e8; color: #c0392b; border-left: 4px solid #e74c3c; }
    .alert-warning { background: #fff8e1; color: #856404; border-left: 4px solid #ffc107; }
    /* ── 首页英雄区 ── */
    .hero {
      text-align: center;
      padding: 60px 20px 40px;
    }
    .hero h1 { font-size: 32px; color: #1a478a; margin-bottom: 12px; }
    .hero p  { font-size: 16px; color: #666; margin-bottom: 36px; }
    .hero-cards { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
    .hero-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      padding: 36px 40px;
      width: 260px;
      text-decoration: none;
      color: inherit;
      transition: transform .2s, box-shadow .2s;
      border-top: 4px solid #1a478a;
    }
    .hero-card:hover { transform: translateY(-4px); box-shadow: 0 6px 18px rgba(0,0,0,.13); }
    .hero-card .icon { font-size: 40px; margin-bottom: 14px; }
    .hero-card h2  { font-size: 18px; color: #1a478a; margin-bottom: 8px; }
    .hero-card p   { font-size: 13px; color: #888; line-height: 1.7; }
    /* ── 下载按钮区 ── */
    .action-bar { display: flex; justify-content: flex-end; margin-bottom: 12px; }
    /* ── 滚动表格容器 ── */
    .table-wrap { overflow-x: auto; }
  </style>
</head>
<body>
<header>
  <div class="logo">🏦 账户与交易查询系统</div>
  <nav>
    <a href="{{ url_for('index') }}"
       {% if request.endpoint == 'index' %}class="active"{% endif %}>首页</a>
    <a href="{{ url_for('account_query') }}"
       {% if request.endpoint == 'account_query' %}class="active"{% endif %}>账户信息查询</a>
    <a href="{{ url_for('transaction_query') }}"
       {% if request.endpoint == 'transaction_query' %}class="active"{% endif %}>交易信息查询</a>
  </nav>
</header>

<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
