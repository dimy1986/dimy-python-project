{% extends "base.html" %}
{% block title %}{{ cfg.title }}{% endblock %}

{% block content %}
<div class="card">
  <div class="card-title">{{ cfg.title }}</div>
  <form id="query-form" onsubmit="return false;">
    {% if cfg.date_range %}
    <div class="form-row" style="margin-bottom:14px;">
      <div class="form-group">
        <label>开始日期</label>
        <input id="f-date-from" type="date" name="date_from" value="{{ date_from }}">
      </div>
      <div class="form-group">
        <label>结束日期</label>
        <input id="f-date-to" type="date" name="date_to" value="{{ date_to }}">
      </div>
    </div>
    {% endif %}
    <div class="form-row">
      <div class="form-group">
        <label>查询类型</label>
        <select id="f-search-type" name="search_type">
          {% for sf in cfg.search_fields %}
          <option value="{{ sf.value }}" {% if search_type == sf.value %}selected{% endif %}>{{ sf.label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group" style="flex:1; min-width:220px;">
        <label>查询关键词（支持模糊匹配）</label>
        <input id="f-keyword" type="text" name="keyword" value="{{ keyword }}"
               placeholder="{{ cfg.keyword_placeholder }}" autocomplete="off">
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <div style="display:flex; align-items:center; gap:12px;">
          <button type="submit" id="search-btn" class="btn btn-primary">🔍 查询</button>
          <span id="query-status" style="font-size:13px; display:none;"></span>
        </div>
      </div>
    </div>
  </form>
</div>

<div id="results-card" class="card" style="display:none;">
  <div class="card-title">查询结果</div>
  <div id="results-container"></div>
</div>

<script>
(function () {
  'use strict';

  /* ── 从 Jinja 注入的配置 ── */
  var QUERY_ID       = {{ query_id | tojson }};
  var COLUMNS        = {{ cfg.columns | tojson }};
  var PAGE_LIMIT     = {{ page_limit }};
  var RESULT_LABEL   = {{ cfg.result_count_label | tojson }};
  var HAS_DATE_RANGE = {{ 'true' if cfg.date_range else 'false' }};
  var DOWNLOAD_URL   = {{ url_for(query_id + '_download') | tojson }};
  var API_URL        = {{ url_for(query_id + '_api') | tojson }};
  var EMPTY_MSG      = {{ cfg.empty_message | tojson }};
  var CACHE_KEY      = 'qcache_' + QUERY_ID;

  /* ── 工具函数 ── */
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function fmtCell(col, val) {
    if (val === null || val === undefined || val === '') return '';
    if (col.format === 'money') {
      var n = parseFloat(val);
      return isNaN(n) ? esc(String(val)) : n.toFixed(2);
    }
    if (col.format === 'badge') {
      var bmap = col.badge_map || {};
      var css  = bmap[val] || bmap['_default'] || '';
      return '<span class="badge ' + esc(css) + '">' + esc(String(val)) + '</span>';
    }
    return esc(String(val));
  }

  /* ── 表格分页 ── */
  function initPagination() {
    var PAGE_SIZE  = 20;
    var currentPage = 1;
    var tbody = document.querySelector('#result-table tbody');
    var rows  = tbody ? Array.from(tbody.querySelectorAll('tr')) : [];
    var totalPages = Math.ceil(rows.length / PAGE_SIZE);

    function showPage(page) {
      currentPage = page;
      var s = (page - 1) * PAGE_SIZE, e = s + PAGE_SIZE;
      rows.forEach(function (tr, i) { tr.style.display = (i >= s && i < e) ? '' : 'none'; });
      renderPager();
    }

    function renderPager() {
      var el = document.getElementById('pagination');
      if (!el || totalPages <= 1) return;
      el.innerHTML = '';

      function btn(label, page, disabled, active) {
        var b = document.createElement('button');
        b.textContent = label;
        if (disabled) b.disabled = true;
        if (active)   b.classList.add('active');
        if (!disabled && !active) b.addEventListener('click', function () { showPage(page); });
        return b;
      }

      el.appendChild(btn('‹ 上一页', currentPage - 1, currentPage === 1, false));
      var s = Math.max(1, currentPage - 2), e = Math.min(totalPages, currentPage + 2);
      if (s > 1) {
        el.appendChild(btn('1', 1, false, false));
        if (s > 2) { var sp = document.createElement('span'); sp.className = 'page-info'; sp.textContent = '…'; el.appendChild(sp); }
      }
      for (var p = s; p <= e; p++) el.appendChild(btn(String(p), p, false, p === currentPage));
      if (e < totalPages) {
        if (e < totalPages - 1) { var sp2 = document.createElement('span'); sp2.className = 'page-info'; sp2.textContent = '…'; el.appendChild(sp2); }
        el.appendChild(btn(String(totalPages), totalPages, false, false));
      }
      el.appendChild(btn('下一页 ›', currentPage + 1, currentPage === totalPages, false));
      var info = document.createElement('span');
      info.className = 'page-info';
      info.textContent = '第 ' + currentPage + ' / ' + totalPages + ' 页';
      el.appendChild(info);
    }

    if (rows.length > 0) showPage(1);
  }

  /* ── 渲染结果 ── */
  function renderResults(data) {
    var card      = document.getElementById('results-card');
    var container = document.getElementById('results-container');
    card.style.display = '';

    if (data.error) {
      container.innerHTML = '<div class="alert alert-danger">' + esc(data.error) + '</div>';
      return;
    }

    if (!data.rows || data.rows.length === 0) {
      container.innerHTML = '<div class="alert alert-warning">' + esc(EMPTY_MSG) + '</div>';
      return;
    }

    var total   = data.total_count;
    var rows    = data.rows;   /* already limited to PAGE_LIMIT by server */
    var dateInfo = HAS_DATE_RANGE ? '（' + esc(data.date_from) + ' 至 ' + esc(data.date_to) + '）' : '';

    /* 下载表单隐藏域 */
    var hidden = '<input type="hidden" name="keyword" value="' + esc(data.keyword) + '">'
               + '<input type="hidden" name="search_type" value="' + esc(data.search_type) + '">';
    if (HAS_DATE_RANGE) {
      hidden += '<input type="hidden" name="date_from" value="' + esc(data.date_from) + '">'
              + '<input type="hidden" name="date_to"   value="' + esc(data.date_to)   + '">';
    }

    var warning = total > PAGE_LIMIT
      ? '<div class="alert alert-warning" style="margin-bottom:12px;">⚠ 结果超过 ' + PAGE_LIMIT
        + ' 条，页面仅显示前 ' + PAGE_LIMIT + ' 条记录，完整数据请点击右上角「下载 Excel」。</div>'
      : '';

    var thHtml = COLUMNS.map(function (c) { return '<th>' + esc(c.label) + '</th>'; }).join('');
    var tbHtml = rows.map(function (row) {
      var cells = COLUMNS.map(function (col) {
        var val   = row[col.key];
        var style = col.format === 'money' ? ' style="text-align:right;"' : '';
        return '<td' + style + '>' + fmtCell(col, val) + '</td>';
      }).join('');
      return '<tr>' + cells + '</tr>';
    }).join('');

    container.innerHTML =
        '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">'
      + '  <div class="result-info">共找到 <span>' + total + '</span> 条' + RESULT_LABEL + dateInfo + '</div>'
      + '  <form method="POST" action="' + DOWNLOAD_URL + '">' + hidden
      + '    <button type="submit" class="btn btn-success">⬇ 下载 Excel</button>'
      + '  </form>'
      + '</div>'
      + warning
      + '<div class="table-wrap">'
      + '  <table id="result-table">'
      + '    <thead><tr>' + thHtml + '</tr></thead>'
      + '    <tbody>' + tbHtml + '</tbody>'
      + '  </table>'
      + '</div>'
      + '<div class="pagination" id="pagination"></div>';

    initPagination();
  }

  /* ── 状态提示 ── */
  function setStatus(text, color) {
    var el = document.getElementById('query-status');
    el.textContent = text;
    el.style.color = color || '#666';
    el.style.display = text ? '' : 'none';
  }

  /* ── 表单提交（AJAX）── */
  document.getElementById('query-form').addEventListener('submit', function (e) {
    e.preventDefault();

    var btn = document.getElementById('search-btn');
    btn.disabled = true;
    btn.textContent = '🔄 查询中…';
    setStatus('查询中，请稍候…', '#e67e22');

    var formData = new FormData(this);

    fetch(API_URL, { method: 'POST', body: formData })
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function (data) {
        /* 缓存到 sessionStorage 供切换页面后恢复 */
        try { sessionStorage.setItem(CACHE_KEY, JSON.stringify(data)); } catch (cacheErr) {
          console.warn('sessionStorage write failed:', cacheErr);
        }

        renderResults(data);

        if (data.error) {
          setStatus('⚠ 查询失败', '#c0392b');
        } else {
          var n = data.total_count;
          setStatus('✅ 查询完成，共 ' + n + ' 条记录', '#27ae60');
        }
      })
      .catch(function (err) {
        setStatus('⚠ 请求失败：' + err.message, '#c0392b');
      })
      .finally(function () {
        btn.disabled = false;
        btn.textContent = '🔍 查询';
      });
  });

  /* ── 页面加载：从 sessionStorage 同步恢复结果（脚本在页面底部，DOM 已就绪）── */
  try {
    var _raw = sessionStorage.getItem(CACHE_KEY);
    if (_raw) {
      var _cached = JSON.parse(_raw);

      /* 恢复表单输入值 */
      var _kw = document.getElementById('f-keyword');
      var _st = document.getElementById('f-search-type');
      if (_kw && _cached.keyword)     _kw.value = _cached.keyword;
      if (_st && _cached.search_type) _st.value = _cached.search_type;
      if (HAS_DATE_RANGE) {
        var _df = document.getElementById('f-date-from');
        var _dt = document.getElementById('f-date-to');
        if (_df && _cached.date_from) _df.value = _cached.date_from;
        if (_dt && _cached.date_to)   _dt.value = _cached.date_to;
      }

      /* 渲染缓存的查询结果 */
      renderResults(_cached);

      if (!_cached.error) {
        setStatus('✅ 查询完成，共 ' + _cached.total_count + ' 条记录', '#27ae60');
      }
    }
  } catch (restoreErr) {
    console.warn('sessionStorage restore failed:', restoreErr);
  }

})();
</script>
{% endblock %}
